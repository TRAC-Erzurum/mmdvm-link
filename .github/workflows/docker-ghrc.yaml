name: Build & Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.cursor/**'
      - '.editorconfig'

jobs:
  build-and-push-mmdvm-link-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker tags
        id: docker_tags
        run: |
          BUILD_NUM=${{ github.run_number }}
          ORG_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # Keep image name stable for trac-portal compose:
          IMAGE="ghcr.io/${ORG_NAME}/mmdvm-link-server"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            MMDVM_TAGS="${IMAGE}:${VERSION} ${IMAGE}:latest"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            MMDVM_TAGS=""
          else
            MMDVM_TAGS="${IMAGE}:main-build.${BUILD_NUM} ${IMAGE}:pre-release"
          fi

          echo "mmdvm_tags=${MMDVM_TAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION:-pr}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Pull pre-release image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ORG_NAME=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${ORG_NAME}/mmdvm-link-server:pre-release
          docker tag ghcr.io/${ORG_NAME}/mmdvm-link-server:pre-release temp-mmdvm-link-server

      - name: Build mmdvm-link-server image
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'pull_request'
        run: |
          docker build --no-cache -t temp-mmdvm-link-server -f docker/server.Dockerfile .

      - name: Tag and Push image
        if: github.event_name != 'pull_request' && steps.docker_tags.outputs.mmdvm_tags != ''
        run: |
          for TAG in ${{ steps.docker_tags.outputs.mmdvm_tags }}; do
            docker tag temp-mmdvm-link-server $TAG
            docker push $TAG
          done
